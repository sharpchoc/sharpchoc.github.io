<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>About · Mukesh</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <script>
    // Apply theme and sidebar state immediately to prevent flicker
    (function () {
      const theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      const sidebarHidden = localStorage.getItem('sidebarHidden') === 'true';
      if (sidebarHidden) {
        document.documentElement.classList.add('sidebar-hidden');
      }
    })();
  </script>
  <!-- MathJax for LaTeX support -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      }
    };
  </script>
  <script type="text/javascript" id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>
</head>

<body>
  <!-- Independent Controls -->
  <button id="sidebar-toggle" class="sidebar-toggle-btn" aria-label="Toggle sidebar">
    <span class="icon">☰</span>
  </button>

  <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark mode">
    <span class="sun-icon">☀️</span>
    <span class="moon-icon">🌙</span>
  </button>

  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="brand-name">Mukesh</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/" class="nav-item">About</a>
        <a href="/mini-projects/" class="nav-item">Mini Projects</a>
        <div class="spacer"></div>
        <div class="sidebar-footer">
          <a href="https://github.com/sharpchoc" class="nav-item">GitHub</a>
        </div>
      </nav>
    </aside>

    <main class="main-content">
      <div class="wrapper">
        <section>
          <h1 id="about">About</h1>

<p>Hey! I’m super excited about improving our understanding of frontier AI models and how to best align them.</p>

<hr />

<h3 id="links">Links</h3>
<ul>
  <li><a href="https://github.com/sharpchoc">GitHub</a></li>
</ul>

        </section>
      </div>
    </main>
  </div>

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const sidebarToggle = document.getElementById('sidebar-toggle');

    // Theme toggle logic
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });

    // Sidebar toggle logic
    sidebarToggle.addEventListener('click', () => {
      const isHidden = document.documentElement.classList.toggle('sidebar-hidden');
      localStorage.setItem('sidebarHidden', isHidden);
    });
  </script>
</body>

</html>
