<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="site-shell">
    <aside class="sidebar">
      <div class="sidebar-inner">
        <div class="site-identity">
          <h1 class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
          <p class="site-description">{{ site.description }}</p>
        </div>

        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}" class="nav-link">About</a>
          <a href="{{ '/mini-projects/' | relative_url }}" class="nav-link">Mini Projects</a>
          <a href="{{ '/blog/' | relative_url }}" class="nav-link">Blog</a>
        </nav>

        <div class="sidebar-contact">
        <div class="sidebar-contact-title">Links</div>
        <div><a href="https://github.com/sharpchoc" target="_blank" rel="noopener noreferrer">GitHub</a></div>
        <div><span id="sidebar-email-link"></span></div>
      </div>
      </div>
    </aside>

    <main class="main-content">
      <article class="page-content">
        {{ content }}
      </article>
    </main>
  </div>

  <script>
    const sidebarEmailTarget = document.getElementById('sidebar-email-link');

    if (sidebarEmailTarget) {
      const user = 'YOUR_USERNAME';
      const domainName = 'gmail';
      const tld = 'com';
      const email = `${user}@${domainName}.${tld}`;

      sidebarEmailTarget.innerHTML = `
        <a href="mailto:${email}" class="icon-link" aria-label="Email" title="Email">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M3 5h18a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Zm0 2v.01L12 13l9-5.99V7H3Zm18 10V9.24l-8.46 5.64a1 1 0 0 1-1.08 0L3 9.24V17h18Z"/>
          </svg>
        </a>
      `;
    }
  </script>
</body>
</html>
