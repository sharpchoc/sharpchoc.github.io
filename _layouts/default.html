<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    // Apply theme and sidebar state immediately to prevent flicker
    (function () {
      const theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      const savedSidebarState = localStorage.getItem('sidebarHidden');
      const sidebarHidden = savedSidebarState === null || savedSidebarState === 'true';
      
      if (sidebarHidden) {
        document.documentElement.classList.add('sidebar-hidden');
      }
    })();
  </script>
  <!-- MathJax for LaTeX support -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      }
    };
  </script>
  <script type="text/javascript" id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>
</head>

<body>
  <!-- Independent Controls -->
  <button id="sidebar-toggle" class="sidebar-toggle-btn" aria-label="Toggle sidebar">
    <span class="icon">☰</span>
  </button>

  <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark mode">
    <span class="sun-icon">☀️</span>
    <span class="moon-icon">🌙</span>
  </button>

  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="brand-name">Mukesh</span>
      </div>
      <nav class="sidebar-nav">
        <a href="{{ '/' | relative_url }}" class="nav-item">About</a>
        <a href="{{ '/mini-projects/' | relative_url }}" class="nav-item">Mini Projects</a>
        <div class="spacer"></div>
        <div class="sidebar-footer">
          <a href="https://github.com/sharpchoc" class="nav-item">GitHub</a>
        </div>
      </nav>
    </aside>

    <main class="main-content">
      <div class="wrapper">
        <section>
          {{ content }}
        </section>
      </div>
    </main>
  </div>

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const sidebarToggle = document.getElementById('sidebar-toggle');

    // Theme toggle logic
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });

    // Sidebar toggle logic
    sidebarToggle.addEventListener('click', () => {
      const isHidden = document.documentElement.classList.toggle('sidebar-hidden');
      localStorage.setItem('sidebarHidden', isHidden);
    });
    const emailIconTarget = document.getElementById('email-icon-link');

    if (emailIconTarget) {
      const user = 'spamsmith254';
      const domainName = 'gmail';
      const tld = 'com';
      const email = `${user}@${domainName}.${tld}`;
    
      emailIconTarget.innerHTML = `
        <a href="mailto:${email}" class="icon-link" aria-label="Email" title="Email">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M3 5h18a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Zm0 2v.01L12 13l9-5.99V7H3Zm18 10V9.24l-8.46 5.64a1 1 0 0 1-1.08 0L3 9.24V17h18Z"/>
          </svg>
        </a>
      `;
    }
  </script>
</body>

</html>
