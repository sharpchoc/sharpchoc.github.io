<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="site-shell">
    <aside class="sidebar">
      <div class="sidebar-inner">
        <div class="site-identity">
          <h1 class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
          <p class="site-description">{{ site.description }}</p>
        </div>

        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}" class="nav-link">About</a>
          <a href="{{ '/mini-projects/' | relative_url }}" class="nav-link">Mini Projects</a>
          <a href="{{ '/blog/' | relative_url }}" class="nav-link">Blog</a>
        </nav>

        <div class="sidebar-icons">
          <a href="https://github.com/sharpchoc" class="icon-link" aria-label="GitHub" title="GitHub" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.79-.26.79-.58v-2.02c-3.34.73-4.04-1.41-4.04-1.41-.55-1.38-1.34-1.75-1.34-1.75-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.08 1.84 2.82 1.31 3.5 1 .11-.78.42-1.31.76-1.61-2.67-.31-5.47-1.34-5.47-5.95 0-1.31.47-2.38 1.24-3.22-.12-.31-.54-1.56.12-3.25 0 0 1.01-.32 3.3 1.23A11.5 11.5 0 0 1 12 6.84c1.02 0 2.05.14 3.01.41 2.29-1.55 3.29-1.23 3.29-1.23.67 1.69.25 2.94.13 3.25.77.84 1.23 1.91 1.23 3.22 0 4.62-2.8 5.63-5.48 5.94.43.37.82 1.1.82 2.22v3.29c0 .32.19.69.8.57C20.57 21.79 24 17.29 24 12c0-6.63-5.37-12-12-12Z"/>
            </svg>
          </a>

          <span id="sidebar-email-link"></span>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <article class="page-content">
        {{ content }}
      </article>
    </main>
  </div>

  <script>
    const sidebarEmailTarget = document.getElementById('sidebar-email-link');

    if (sidebarEmailTarget) {
      const user = 'YOUR_USERNAME';
      const domainName = 'gmail';
      const tld = 'com';
      const email = `${user}@${domainName}.${tld}`;

      sidebarEmailTarget.innerHTML = `
        <a href="mailto:${email}" class="icon-link" aria-label="Email" title="Email">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M3 5h18a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Zm0 2v.01L12 13l9-5.99V7H3Zm18 10V9.24l-8.46 5.64a1 1 0 0 1-1.08 0L3 9.24V17h18Z"/>
          </svg>
        </a>
      `;
    }
  </script>
</body>
</html>
