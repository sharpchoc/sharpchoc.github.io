<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-left">
        <a href="{{ '/' | relative_url }}" class="site-title-link">{{ site.title }}</a>
      </div>

      <nav class="topbar-nav">
        <a href="{{ '/' | relative_url }}">About</a>
        <a href="{{ '/mini-projects/' | relative_url }}">Mini Projects</a>
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
      </nav>

      <div class="topbar-links">
        <a href="https://github.com/sharpchoc" target="_blank" rel="noopener noreferrer">GitHub</a>
        <span id="topbar-email-link"></span>
      </div>
    </div>
  </header>

  <main class="main-content">
    <article class="page-content">
      {{ content }}
    </article>
  </main>

  <script>
    const topbarEmailTarget = document.getElementById('topbar-email-link');

    if (topbarEmailTarget) {
      const user = 'spamsmith254';
      const domainName = 'gmail';
      const tld = 'com';
      const email = `${user}@${domainName}.${tld}`;

      topbarEmailTarget.innerHTML = `<a href="mailto:${email}">Email</a>`;
    }
  </script>
</body>
</html>
