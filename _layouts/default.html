<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    // Apply theme and sidebar state immediately to prevent flicker
    (function () {
      const theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      const savedSidebarState = localStorage.getItem('sidebarHidden');
      const sidebarHidden = savedSidebarState === null || savedSidebarState === 'true';
      
      if (sidebarHidden) {
        document.documentElement.classList.add('sidebar-hidden');
      }
    })();
  </script>
  <!-- MathJax for LaTeX support -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      }
    };
  </script>
  <script type="text/javascript" id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>
</head>

<body>
  <!-- Independent Controls -->
  <button id="sidebar-toggle" class="sidebar-toggle-btn" aria-label="Toggle sidebar">
    <span class="icon">☰</span>
  </button>

  <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark mode">
    <span class="sun-icon">☀️</span>
    <span class="moon-icon">🌙</span>
  </button>

  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="brand-name">Mukesh Ramanathan</span>
      </div>
      <nav class="sidebar-nav">
        <a href="{{ '/' | relative_url }}" class="nav-item">About</a>
        <a href="{{ '/mini-projects/' | relative_url }}" class="nav-item">Mini Projects</a>
        <a href="{{ '/blog/' | relative_url }}" class="nav-item">Blog</a>
        <div class="spacer"></div>
        <div class="sidebar-footer">
  <div class="sidebar-icon-links">
    <a href="https://github.com/sharpchoc" class="icon-link" aria-label="GitHub" title="GitHub">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path fill="currentColor" d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.79-.26.79-.58v-2.02c-3.34.73-4.04-1.41-4.04-1.41-.55-1.38-1.34-1.75-1.34-1.75-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.08 1.84 2.82 1.31 3.5 1 .11-.78.42-1.31.76-1.61-2.67-.31-5.47-1.34-5.47-5.95 0-1.31.47-2.38 1.24-3.22-.12-.31-.54-1.56.12-3.25 0 0 1.01-.32 3.3 1.23A11.5 11.5 0 0 1 12 6.84c1.02 0 2.05.14 3.01.41 2.29-1.55 3.29-1.23 3.29-1.23.67 1.69.25 2.94.13 3.25.77.84 1.23 1.91 1.23 3.22 0 4.62-2.8 5.63-5.48 5.94.43.37.82 1.1.82 2.22v3.29c0 .32.19.69.8.57C20.57 21.79 24 17.29 24 12c0-6.63-5.37-12-12-12Z"/>
      </svg>
    </a>

    <span id="sidebar-email-link"></span>
  </div>
</div>
      </nav>
    </aside>

    <main class="main-content">
      <div class="wrapper">
        <section>
          {{ content }}
        </section>
      </div>
    </main>
  </div>

<script>
 const themeToggle = document.getElementById('theme-toggle');
 const sidebarToggle = document.getElementById('sidebar-toggle');

 // Theme toggle logic
 themeToggle.addEventListener('click', () => {
   const currentTheme = document.documentElement.getAttribute('data-theme');
   const newTheme = currentTheme === 'light' ? 'dark' : 'light';
   document.documentElement.setAttribute('data-theme', newTheme);
   localStorage.setItem('theme', newTheme);
 });

 // Sidebar toggle logic
 sidebarToggle.addEventListener('click', () => {
   const isHidden = document.documentElement.classList.toggle('sidebar-hidden');
   localStorage.setItem('sidebarHidden', isHidden);
 });

 // Email icon link
 const emailIconTarget = document.getElementById('email-icon-link');

 if (emailIconTarget) {
   const user = 'spamsmith254';
   const domainName = 'gmail';
   const tld = 'com';
   const email = `${user}@${domainName}.${tld}`;

   emailIconTarget.innerHTML = `
     <a href="mailto:${email}" class="icon-link" aria-label="Email" title="Email">
       <svg viewBox="0 0 24 24" aria-hidden="true">
         <path fill="currentColor" d="M3 5h18a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Zm0 2v.01L12 13l9-5.99V7H3Zm18 10V9.24l-8.46 5.64a1 1 0 0 1-1.08 0L3 9.24V17h18Z"/>
       </svg>
     </a>
   `;
 }
  const sidebarEmailTarget = document.getElementById('sidebar-email-link');

if (sidebarEmailTarget) {
  const user = 'YOUR_USERNAME';
  const domainName = 'gmail';
  const tld = 'com';
  const email = `${user}@${domainName}.${tld}`;

  sidebarEmailTarget.innerHTML = `
    <a href="mailto:${email}" class="icon-link" aria-label="Email" title="Email">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path fill="currentColor" d="M3 5h18a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Zm0 2v.01L12 13l9-5.99V7H3Zm18 10V9.24l-8.46 5.64a1 1 0 0 1-1.08 0L3 9.24V17h18Z"/>
      </svg>
    </a>
  `;
}
</script>
</body>

</html>
